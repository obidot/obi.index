version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: obidot-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: obidot
      POSTGRES_PASSWORD: obidot
      POSTGRES_DB: obidot_index
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obidot -d obidot_index"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
